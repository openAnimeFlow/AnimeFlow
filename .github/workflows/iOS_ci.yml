name: Flutter iOS CI

on:
  workflow_dispatch:

jobs:
  ios-debug-run:
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version-file: pubspec.yaml

      - name: Create .env file
        run: |
          echo "CLIENT_ID=${{ secrets.CLIENT_ID }}" >> .env
          echo "REDIRECT_URI=${{ secrets.REDIRECT_URI }}" >> .env
          echo "DANDANPLAY_ID=${{ secrets.DANDANPLAY_ID }}" >> .env
          echo "DANDANPLAY_SECRET=${{ secrets.DANDANPLAY_SECRET }}" >> .env

      - name: Install dependencies
        run: flutter pub get

      - name: Boot iOS Simulator
        run: |
          set -euxo pipefail
          xcrun simctl shutdown all || true
          xcrun simctl list devices available > sim_devices.txt
          python3 - <<'PY'
          import re
          import sys

          with open("sim_devices.txt", "r", encoding="utf-8") as f:
              lines = f.readlines()

          # Prefer iPhone 16 family, fallback to any iPhone.
          candidates = []
          for line in lines:
              m = re.search(r'^\s*(iPhone[^()]+)\s+\(([0-9A-F-]{36})\)\s+\(([^)]+)\)', line.strip())
              if m:
                  name, udid, state = m.groups()
                  candidates.append((name.strip(), udid, state.strip()))

          preferred = [c for c in candidates if c[0].startswith("iPhone 16")]
          selected = (preferred or candidates)[0] if (preferred or candidates) else None

          if not selected:
              print("No available iPhone simulator found.", file=sys.stderr)
              sys.exit(1)

          name, udid, _ = selected
          print(f"Selected simulator: {name} ({udid})")
          with open("sim_selected.env", "w", encoding="utf-8") as out:
              out.write(f"IOS_SIM_NAME={name}\n")
              out.write(f"IOS_SIM_UDID={udid}\n")
          PY
          IOS_SIM_NAME="$(sed -n 's/^IOS_SIM_NAME=//p' sim_selected.env)"
          IOS_SIM_UDID="$(sed -n 's/^IOS_SIM_UDID=//p' sim_selected.env)"
          cat sim_selected.env >> "$GITHUB_ENV"
          xcrun simctl boot "$IOS_SIM_UDID" || true
          open -a Simulator
          xcrun simctl bootstatus "$IOS_SIM_UDID" -b
          xcrun simctl list devices | grep -E "$IOS_SIM_UDID|$IOS_SIM_NAME"

      - name: Run Flutter App (Debug) and Capture Logs
        id: debug_run
        run: |
          set -euxo pipefail
          flutter devices
          nohup flutter run -d "$IOS_SIM_UDID" --debug --verbose > flutter_run.log 2>&1 &
          echo $! > flutter_run.pid
          sleep 180
          flutter logs -d "$IOS_SIM_UDID" --verbose > flutter_logs.log 2>&1 &
          echo $! > flutter_logs.pid
          sleep 180

      - name: Print Logs
        if: always()
        run: |
          echo "===== flutter_run.log ====="
          [ -f flutter_run.log ] && tail -n 1000 flutter_run.log || echo "flutter_run.log not found"
          echo "===== flutter_logs.log ====="
          [ -f flutter_logs.log ] && tail -n 1000 flutter_logs.log || echo "flutter_logs.log not found"

      - name: Stop Background Processes
        if: always()
        run: |
          [ -f flutter_logs.pid ] && kill "$(cat flutter_logs.pid)" || true
          [ -f flutter_run.pid ] && kill "$(cat flutter_run.pid)" || true